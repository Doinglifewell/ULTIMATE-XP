<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Experiences — The Party Has Arrived</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --violet:#B354F1;--gold:#FFD166;--pink:#FF1B9A;--green:#28B79D;
  --orchid:#6A14DB;--bg:#07070a;--d1:#0d0d10;--d2:#141418;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Fredoka One',cursive;display:flex;flex-direction:column;
     align-items:center;justify-content:center;position:relative}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}

/* SCENE */
.scene{position:relative;width:100%;height:100vh;display:flex;
       align-items:flex-end;justify-content:center;overflow:hidden}

/* ROAD */
.road{position:absolute;bottom:0;left:0;right:0;height:64px;
      background:var(--d2);border-top:2px solid #2e2e38;z-index:1}
.road-dash{position:absolute;bottom:28px;height:4px;width:72px;
           background:var(--gold);opacity:.35;border-radius:2px;
           animation:dashMove .7s linear infinite}
@keyframes dashMove{from{transform:translateX(110vw)}to{transform:translateX(-200px)}}

/* VAN WRAPPER — drives in, stops centre */
.van-wrap{
  position:absolute;
  bottom:56px;
  left:50%;
  transform:translateX(130vw);
  z-index:10;
  width:220px;
  height:220px;
  animation:vanDrive 2.6s cubic-bezier(0.22,0.61,0.36,1) 0.2s forwards;
}
@keyframes vanDrive{
  0%  {transform:translateX(130vw)}
  68% {transform:translateX(-50%)}
  78% {transform:translateX(calc(-50% + 12px))}
  86% {transform:translateX(calc(-50% - 5px))}
  93% {transform:translateX(calc(-50% + 2px))}
  100%{transform:translateX(-50%)}
}
/* Gentle idle bob after parking */
.van-wrap.parked{
  animation:vanBob 0.4s ease-out forwards,
            vanIdle 2.8s ease-in-out 0.4s infinite
}
@keyframes vanBob{
  0%  {transform:translateX(-50%) scaleY(.93)}
  55% {transform:translateX(-50%) scaleY(1.04)}
  100%{transform:translateX(-50%) scaleY(1)}
}
@keyframes vanIdle{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%    {transform:translateX(-50%) translateY(-4px)}
}
/* The inline SVG itself — no glow, no shadow, just the van */
.van-svg{width:220px;height:220px;display:block}

/* STICKMEN */
.stickman{
  position:absolute;bottom:62px;z-index:8;
  opacity:0;transform-origin:bottom center;
}

/* Slide/pop-in timings */
.sm1{left:50%;margin-left:-300px;
     animation:slideL .55s ease-out 3.3s forwards,
               dance1 .65s ease-in-out 4.0s infinite alternate}
.sm2{left:50%;margin-left:-195px;
     animation:slideL .55s ease-out 3.6s forwards,
               dance3 .75s ease-in-out 4.3s infinite alternate}
.sm5{left:50%;margin-left:-48px;
     animation:popOut .45s cubic-bezier(0.34,1.56,0.64,1) 3.1s forwards,
               dance2 .60s ease-in-out 3.9s infinite alternate}
.sm3{left:50%;margin-left:112px;
     animation:slideR .55s ease-out 3.4s forwards,
               dance2 .55s ease-in-out 4.1s infinite alternate}
.sm4{left:50%;margin-left:216px;
     animation:slideR .55s ease-out 3.7s forwards,
               dance1 .70s ease-in-out 4.4s infinite alternate}

@keyframes slideL{
  0%  {opacity:0;transform:translateX(-200px)}
  25% {opacity:1}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes slideR{
  0%  {opacity:0;transform:translateX(200px)}
  25% {opacity:1}
  100%{opacity:1;transform:translateX(0)}
}
@keyframes popOut{
  0%  {opacity:0;transform:translateY(-50px) scale(.4)}
  60% {opacity:1;transform:translateY(10px) scale(1.06)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes dance1{0%{transform:rotate(-8deg) translateY(0)}   100%{transform:rotate(6deg)  translateY(-10px)}}
@keyframes dance2{0%{transform:rotate(5deg)  translateY(-4px)} 100%{transform:rotate(-7deg) translateY(8px)}}
@keyframes dance3{0%{transform:rotate(-5deg) translateY(0)}   100%{transform:rotate(9deg)  translateY(-12px)}}

/* CHANNEL PILLS */
.ch-pill{
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;transform:translateX(-50%);
  border-radius:100px;
  padding:3px 10px;
  font-family:'Bebas Neue',sans-serif;
  font-size:11px;letter-spacing:.1em;
  white-space:nowrap;opacity:0;
}
.sm1 .ch-pill{background:#0f0820;border:1.5px solid #B354F1;color:#B354F1;
  animation:pillIn .35s ease 4.0s forwards,floatPill 2s ease-in-out 4.35s infinite}
.sm2 .ch-pill{background:#1a1200;border:1.5px solid #FFD166;color:#FFD166;
  animation:pillIn .35s ease 4.3s forwards,floatPill 2s ease-in-out 4.65s infinite}
.sm5 .ch-pill{background:#0f0820;border:1.5px solid #B354F1;color:#B354F1;
  animation:pillIn .35s ease 3.9s forwards,floatPill 2s ease-in-out 4.25s infinite}
.sm3 .ch-pill{background:#1a0015;border:1.5px solid #FF1B9A;color:#FF1B9A;
  animation:pillIn .35s ease 4.1s forwards,floatPill 2s ease-in-out 4.45s infinite}
.sm4 .ch-pill{background:#1a1200;border:1.5px solid #FFD166;color:#FFD166;
  animation:pillIn .35s ease 4.4s forwards,floatPill 2s ease-in-out 4.75s infinite}

@keyframes pillIn{
  from{opacity:0;transform:translateX(-50%) translateY(8px)}
  to  {opacity:1;transform:translateX(-50%) translateY(0)}
}
@keyframes floatPill{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%    {transform:translateX(-50%) translateY(-5px)}
}

/* MUSIC NOTES */
.note{position:absolute;pointer-events:none;opacity:0;
      animation:floatNote linear infinite}
@keyframes floatNote{
  0%  {opacity:0;transform:translateY(0) rotate(-10deg)}
  15% {opacity:.85}
  80% {opacity:.5}
  100%{opacity:0;transform:translateY(-90px) rotate(18deg)}
}

/* BANNER */
.banner{
  position:absolute;top:28px;left:50%;
  transform:translateX(-50%) translateY(-24px);
  text-align:center;z-index:20;
  opacity:0;white-space:nowrap;
  animation:bannerIn .7s ease 2.9s forwards;
}
@keyframes bannerIn{
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}
.banner-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,5.5vw,68px);
  letter-spacing:.08em;color:#fff;line-height:1;
}
.banner-title span{color:var(--gold)}
.banner-sub{
  font-family:'Fredoka One',cursive;
  font-size:clamp(13px,2.2vw,20px);
  color:var(--violet);margin-top:6px;letter-spacing:.03em;
}

/* CONFETTI BURST */
.confetti-burst{position:fixed;inset:0;pointer-events:none;z-index:50}
.cb{position:absolute;border-radius:50%;animation:cburst linear forwards}
@keyframes cburst{
  0%  {opacity:1;transform:translate(0,0) rotate(0)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(720deg)}
}

/* FLOOR GLOW — just a soft ambient under the van */
.floor-glow{
  position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
  width:360px;height:32px;
  background:radial-gradient(ellipse,rgba(179,84,241,.18) 0%,transparent 70%);
  z-index:3;opacity:0;
  animation:glowIn .6s ease 3.1s forwards;
}
@keyframes glowIn{to{opacity:1}}

/* BUTTONS */
.back-btn{
  position:fixed;top:16px;left:16px;z-index:100;
  padding:9px 16px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  color:var(--gold);font-family:'Bebas Neue',sans-serif;
  font-size:15px;letter-spacing:.06em;text-decoration:none;
  backdrop-filter:blur(8px);transition:all .15s;
}
.back-btn:hover{background:rgba(179,84,241,.15);border-color:var(--violet)}
.replay-btn{
  position:fixed;bottom:20px;right:20px;z-index:100;
  padding:9px 18px;background:linear-gradient(135deg,#6A14DB,#B354F1);
  border:none;border-radius:10px;color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.06em;
  cursor:pointer;opacity:0;animation:fadeIn .4s ease 5.2s forwards;
}
@keyframes fadeIn{to{opacity:1}}
</style>
</head>

<script>
// Stars
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<110;i++){
    var d=document.createElement('div');d.className='star';
    var sz=Math.random()*2+0.4;
    d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'
      +Math.random()*100+'%;top:'+Math.random()*88+'%;'
      +'animation-duration:'+(Math.random()*3+2)+'s;'
      +'animation-delay:'+(Math.random()*4)+'s';
    s.appendChild(d);
  }
})();

// Van parked: confetti + music notes
setTimeout(function(){
  document.getElementById('van').classList.add('parked');

  // Confetti burst
  var burst=document.getElementById('confetti');
  var colors=['#B354F1','#FFD166','#FF1B9A','#28B79D','#FF9F46','#fff'];
  for(var i=0;i<70;i++){
    var c=document.createElement('div');c.className='cb';
    var sz=Math.random()*9+3;
    var a=Math.random()*360;
    var dist=Math.random()*280+60;
    c.style.cssText='width:'+sz+'px;height:'+sz+'px;'
      +'left:50%;top:45%;'
      +'background:'+colors[Math.floor(Math.random()*colors.length)]+';'
      +'--dx:'+(Math.cos(a*Math.PI/180)*dist)+'px;'
      +'--dy:'+(Math.sin(a*Math.PI/180)*dist-140)+'px;'
      +'animation-duration:'+(Math.random()*.7+.5)+'s;'
      +'animation-delay:'+(Math.random()*.25)+'s';
    burst.appendChild(c);
  }

  // Music notes
  var noteEl=document.getElementById('notes');
  var symbols=['♪','♫','♩','♬'];
  var ncols=['#B354F1','#FFD166','#FF1B9A','#28B79D'];
  for(var j=0;j<14;j++){
    var n=document.createElement('div');n.className='note';
    n.textContent=symbols[Math.floor(Math.random()*symbols.length)];
    var xp=(Math.random()-.5)*640+window.innerWidth/2;
    n.style.cssText='position:absolute;left:'+xp+'px;'
      +'bottom:'+(68+Math.random()*120)+'px;'
      +'color:'+ncols[Math.floor(Math.random()*ncols.length)]+';'
      +'font-size:'+(Math.random()*14+11)+'px;z-index:15;'
      +'animation-duration:'+(Math.random()*2+1.5)+'s;'
      +'animation-delay:'+(Math.random()*3+.4)+'s';
    noteEl.appendChild(n);
  }
},3050);
</script>
