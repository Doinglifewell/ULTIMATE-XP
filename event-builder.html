<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SmartQR</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#000;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"
        onload="boot()" onerror="document.body.innerHTML='QR lib failed'"></script>
<script>
function boot() {

  const BASE    = "https://id.destore.network/transfer/0x7a3B8f2C";
  const IDLE_MS = 9000;
  const SCAT_MS = 1300;
  const GATH_MS = 1500;

  const canvas = document.getElementById("c");
  const dpr    = Math.min(window.devicePixelRatio || 1, 2);
  const W      = window.innerWidth;
  const H      = window.innerHeight;
  const CX     = W / 2;
  const CY     = H / 2;
  const QS     = Math.min(W, H) * 0.72;

  canvas.width        = W * dpr;
  canvas.height       = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";

  const ctx = canvas.getContext("2d", { alpha: false });
  ctx.scale(dpr, dpr);

  function eDrift(t)  { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
  function eArrive(t) { return 1 - Math.pow(1 - t, 3); }

  function offEdge() {
    const m = Math.max(W, H) * 0.9;
    switch (Math.floor(Math.random() * 4)) {
      case 0: return { x: Math.random() * W, y: -m };
      case 1: return { x: W + m,             y: Math.random() * H };
      case 2: return { x: Math.random() * W, y: H + m };
      default:return { x: -m,                y: Math.random() * H };
    }
  }

  function getMatrix(url) {
    const q = window.qrcode(0, "H");
    q.addData(url); q.make();
    const n = q.getModuleCount();
    return { n, m: Array.from({length:n}, (_,r) =>
             Array.from({length:n}, (_,c) => q.isDark(r,c))) };
  }

  function isFinder(r, c, n) {
    return (r<9&&c<9)||(r<9&&c>=n-8)||(r>=n-8&&c<9);
  }

  function makeDots(matrix, n) {
    const ms = QS / n, arr = [];
    for (let r = 0; r < n; r++) {
      for (let c = 0; c < n; c++) {
        if (!matrix[r][c]) continue;
        const tx = CX - QS/2 + (c+0.5)*ms;
        const ty = CY - QS/2 + (r+0.5)*ms;
        arr.push({
          row:r, col:c, n, ms,
          isF: isFinder(r,c,n),
          tx, ty, x:tx, y:ty,
          ex:0, ey:0, ox:0, oy:0,
          sd: Math.random(), gd: 0,
          wph:  Math.random()*Math.PI*2,
          wsp:  1.8+Math.random()*2,
          wamp: (2+Math.random()*4)*ms*0.25,
        });
      }
    }
    return arr;
  }

  function drawDot(d, alpha) {
    if (alpha < 0.01) return;
    const hw = d.ms*0.44, cr = d.isF ? d.ms*0.08 : d.ms*0.28;
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = "#fff";
    ctx.beginPath();
    ctx.roundRect(d.x-hw, d.y-hw, hw*2, hw*2, cr);
    ctx.fill();
  }

  let dots=[], next=null, phase="idle", t0=0, cycle=0;

  function go() {
    if (phase !== "idle") return;
    cycle++;
    for (const d of dots) {
      const ang  = Math.atan2(d.ty-CY, d.tx-CX) + (Math.random()-0.5)*0.9;
      const dist = (0.6+Math.random()*0.6)*Math.max(W,H)*0.9;
      d.ex = d.tx+Math.cos(ang)*dist;
      d.ey = d.ty+Math.sin(ang)*dist;
      d.sd = Math.random();
    }
    const { m, n } = getMatrix(BASE+"?c="+cycle);
    next = makeDots(m, n);
    for (const d of next) {
      const o=offEdge();
      d.ox=o.x; d.oy=o.y; d.x=d.ox; d.y=d.oy;
      const dc=d.col-n/2, dr=d.row-n/2;
      d.gd = Math.min(0.05+Math.sqrt(dc*dc+dr*dr)/(n*0.7)*0.5+Math.random()*0.15, 0.85);
    }
    phase="scatter"; t0=performance.now();
  }

  function loop(now) {
    ctx.fillStyle="#000"; ctx.fillRect(0,0,W,H);
    const el=now-t0, t=now*0.001;

    if (phase==="idle") {
      for (const d of dots) { d.x=d.tx; d.y=d.ty; drawDot(d,1); }

    } else if (phase==="scatter") {
      let done=true;
      for (const d of dots) {
        const raw=(el/SCAT_MS-d.sd*0.45)/(1-d.sd*0.45);
        const p=Math.max(0,Math.min(1,raw));
        const bx=d.tx+(d.ex-d.tx)*eDrift(p);
        const by=d.ty+(d.ey-d.ty)*eDrift(p);
        const ta=Math.atan2(d.ey-d.ty,d.ex-d.tx)+Math.PI/2;
        const wb=Math.sin(t*d.wsp+d.wph)*d.wamp*Math.sin(p*Math.PI);
        d.x=bx+Math.cos(ta)*wb; d.y=by+Math.sin(ta)*wb;
        drawDot(d,Math.pow(1-p,1.2));
        if(p<1) done=false;
      }
      if(done||el>SCAT_MS+100){ dots=next; next=null; phase="gather"; t0=now; }

    } else if (phase==="gather") {
      let done=true;
      for (const d of dots) {
        const raw=(el/GATH_MS-d.gd)/(1-d.gd);
        const p=Math.max(0,Math.min(1,raw));
        const bx=d.ox+(d.tx-d.ox)*eArrive(p);
        const by=d.oy+(d.ty-d.oy)*eArrive(p);
        const ta=Math.atan2(d.ty-d.oy,d.tx-d.ox)+Math.PI/2;
        const wb=Math.sin(t*d.wsp+d.wph)*d.wamp*Math.sin(p*Math.PI)*0.5;
        d.x=bx+Math.cos(ta)*wb; d.y=by+Math.sin(ta)*wb;
        drawDot(d,Math.pow(p,0.6));
        if(p<1) done=false;
      }
      if(done||el>GATH_MS+150){
        for(const d of dots){ d.x=d.tx; d.y=d.ty; }
        phase="idle";
      }
    }

    ctx.globalAlpha=1;
    requestAnimationFrame(loop);
  }

  const { m, n } = getMatrix(BASE+"?c=0");
  dots = makeDots(m, n);
  for (const d of dots){ d.x=d.tx; d.y=d.ty; }
  requestAnimationFrame(loop);
  setInterval(go, IDLE_MS);
}
</script>
</body>
</html>
