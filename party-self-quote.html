<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Hide nav/topbar when loaded inside the dashboard iframe
(function(){
  if(window.self !== window.top){
    document.addEventListener('DOMContentLoaded', function(){
      var nav = document.querySelector('nav') || document.querySelector('.topbar');
      if(nav) nav.style.display = 'none';
    });
  }
})();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Silent Disco Party 🎧 — Byron Bay Silent Disco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
:root{
  --gold:#FFD166;--gold-dim:#c9952a;
  --violet:#B354F1;--orchid:#6A14DB;
  --pink:#FF1B9A;--orange:#FF9F46;
  --green:#28B79D;
  --d0:#07070a;--d1:#0d0d10;--d2:#141418;--d3:#1c1c22;--d4:#26262e;
  --bdr:#2e2e38;--subtle:#3a3a4a;--muted:#6b6b80;--dim:#9999b0;
  --text:#ffffff;
  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --display:'Bebas Neue',sans-serif;
}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes spin-border{to{--angle:360deg}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes chrome-shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes liquid-sweep{0%{left:-75%;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:125%;opacity:0}}
@keyframes liquid-blob{0%{border-radius:14px}20%{border-radius:18px 11px 16px 13px}40%{border-radius:11px 17px 13px 18px}60%{border-radius:16px 13px 18px 11px}80%{border-radius:13px 18px 11px 16px}100%{border-radius:14px}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes countPop{0%{transform:scale(.7) translateY(-6px);opacity:0}60%{transform:scale(1.15) translateY(0)}100%{transform:scale(1);opacity:1}}
@keyframes wiggle{0%,100%{transform:rotate(0deg)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
@keyframes scaleIn{from{transform:scale(.3) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(3deg)}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes ringExpand{0%{transform:scale(.8);opacity:.8}100%{transform:scale(2);opacity:0}}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes partyFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}

*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--d0)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
html,body{background:var(--d0);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
input,select,textarea{font-family:var(--font);color-scheme:dark}
input::placeholder,textarea::placeholder{color:var(--muted)}

#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:999}
body>*:not(#stars):not(#confetti){position:relative;z-index:1}

/* TOPBAR */
.topbar{background:rgba(13,13,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.tb-logo{font-family:var(--display);font-size:17px;letter-spacing:.06em;white-space:nowrap}
.tb-logo .dot{color:var(--gold)}
.tb-logo .sep{display:inline-block;width:1px;height:14px;background:var(--bdr);margin:0 10px;vertical-align:middle}
.tb-logo .bbsd{color:var(--violet)}
.tb-web{font-family:var(--mono);font-size:10px;color:var(--muted);text-decoration:none;padding:5px 12px;border:1px solid var(--bdr);border-radius:6px;transition:all .18s}
.tb-web:hover{border-color:var(--violet);color:var(--violet)}

/* HERO */
.hero{padding:60px 20px 40px;text-align:center;max-width:680px;margin:0 auto}
.hero-emoji{font-size:52px;margin-bottom:14px;display:block;animation:partyFloat 3s ease-in-out infinite}
.hero-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.kicker-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 2s infinite}
.hero-h1{font-family:var(--display);font-size:clamp(48px,10vw,96px);letter-spacing:.02em;line-height:.88;margin-bottom:14px;animation:fadeUp .35s ease both}
.hero-h1 .l1{display:block;color:var(--text)}
.hero-h1 .l2{display:block;color:var(--gold)}
.hero-h1 .l3{display:block;color:var(--pink)}
.hero-sub{font-size:15px;color:var(--dim);font-weight:500;line-height:1.65;margin-bottom:0;animation:fadeUp .4s ease both;max-width:520px;margin:0 auto}
.hero-sub strong{color:var(--text)}

/* Hero CTA */
.hero-cta-btn{background:linear-gradient(135deg,#f0b8d8 0%,#ffffff 12%,#d060a0 28%,#FF1B9A 44%,#c01880 56%,#e068b8 70%,#ffffff 84%,#e8b0d0 100%);background-size:250% 250%;animation:chrome-shift 3s ease infinite, liquid-blob 3.5s ease-in-out infinite;border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:18px 40px;font-family:var(--display);font-size:26px;letter-spacing:.06em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 28px rgba(255,27,154,.45),inset 0 1px 0 rgba(255,255,255,.25);display:inline-flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .2s}
.hero-cta-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:55%;height:200%;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);animation:liquid-sweep 2.4s ease-in-out infinite;pointer-events:none}
.hero-cta-btn:hover{box-shadow:0 12px 40px rgba(255,27,154,.7),inset 0 1px 0 rgba(255,255,255,.25);transform:translateY(-2px)}
.hero-cta-btn:active{transform:scale(.98)}

/* MAIN CARD WRAPPER */
.main{max-width:680px;margin:0 auto;padding:0 20px 100px}

/* STEP LABELS */
.step-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.step-num{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:var(--d0);font-size:9px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* PARTY TYPE SELECTOR */
.party-types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.pt-card{background:var(--d3);border:1.5px solid var(--bdr);border-radius:16px;padding:18px 12px 16px;text-align:center;cursor:pointer;transition:all .2s cubic-bezier(0.34,1.56,0.64,1);user-select:none;position:relative;overflow:hidden}
.pt-card:hover{border-color:var(--subtle);transform:translateY(-2px)}
.pt-card.active{border-color:var(--gold);background:rgba(255,209,102,.1);box-shadow:0 0 24px rgba(255,209,102,.2)}
.pt-card.active::before{content:'✓';position:absolute;top:8px;right:10px;font-size:10px;color:var(--gold);font-weight:900}
.pt-emoji{font-size:32px;display:block;margin-bottom:8px;transition:transform .2s}
.pt-card:hover .pt-emoji{transform:scale(1.15) rotate(-5deg)}
.pt-card.active .pt-emoji{animation:wiggle .4s ease both}
.pt-name{font-family:var(--display);font-size:15px;letter-spacing:.04em;margin-bottom:3px}
.pt-desc{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.04em;line-height:1.4}

/* SECTION CARD */
.s-card{background:var(--d2);border:1px solid var(--bdr);border-radius:16px;padding:22px;margin-bottom:14px;animation:fadeUp .4s ease both}

/* ATTENDEE COUNTER */
.counter-wrap{text-align:center;padding:10px 0 16px}
.counter-num{font-family:var(--display);font-size:clamp(72px,14vw,120px);letter-spacing:.01em;line-height:1;color:var(--gold);display:inline-block}
.counter-unit{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.counter-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.c-btn{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--bdr);background:rgba(255,255,255,.04);font-size:24px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:var(--display);user-select:none}
.c-btn:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,209,102,.1)}
.c-btn:active{transform:scale(.9)}
.c-btn.plus{background:rgba(255,209,102,.12);border-color:var(--gold);color:var(--gold)}
.c-btn.plus:hover{background:rgba(255,209,102,.24);box-shadow:0 0 20px rgba(255,209,102,.3);transform:scale(1.08)}
.c-val-input{width:80px;background:transparent;border:none;font-family:var(--display);font-size:36px;color:var(--gold);text-align:center;outline:none;-moz-appearance:textfield}
.c-val-input::-webkit-inner-spin-button{-webkit-appearance:none}
.presets{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.preset{font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:.04em}
.preset:hover{border-color:var(--gold);color:var(--gold)}
.preset.on{border-color:var(--gold);color:var(--gold);background:rgba(255,209,102,.12)}

/* PACK CONTENTS */
.pack-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.pack-item{display:flex;align-items:center;gap:10px;padding:11px 13px;background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:10px;transition:all .18s}
.pack-item.highlight{border-color:rgba(179,84,241,.3);background:rgba(179,84,241,.07)}
.pack-emoji{font-size:18px;flex-shrink:0}
.pack-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px}
.pack-detail{font-family:var(--mono);font-size:9px;color:var(--muted)}

/* IPAD ADD-ON */
.addon-row{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(179,84,241,.08),rgba(255,27,154,.06));border:1.5px solid rgba(179,84,241,.25);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .18s;user-select:none;gap:12px}
.addon-row:hover{border-color:rgba(179,84,241,.5)}
.addon-row.active{border-color:var(--violet);background:rgba(179,84,241,.15)}
.addon-left{display:flex;align-items:center;gap:12px}
.addon-emoji{font-size:24px}
.addon-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px}
.addon-sub{font-family:var(--mono);font-size:10px;color:var(--muted)}
.addon-toggle{width:40px;height:24px;border-radius:12px;background:var(--bdr);position:relative;transition:all .18s;flex-shrink:0}
.addon-toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:all .18s}
.addon-row.active .addon-toggle{background:var(--violet);box-shadow:0 0 12px rgba(179,84,241,.4)}
.addon-row.active .addon-toggle::after{left:19px;background:#fff}

/* MUSIC NOTE */
.music-note{background:rgba(255,209,102,.05);border:1px solid rgba(255,209,102,.15);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--dim);line-height:1.6;font-weight:500;display:flex;gap:10px;align-items:flex-start}
.music-note strong{color:var(--gold)}

/* PRICE DISPLAY */
.price-card{background:linear-gradient(135deg,rgba(255,209,102,.07),rgba(179,84,241,.06));border:1px solid rgba(255,209,102,.2);border-radius:16px;padding:20px;text-align:center;position:relative;overflow:hidden}
.price-card::before{content:'';position:absolute;inset:-1px;border-radius:17px;background:conic-gradient(from var(--angle),#B354F1,#FFD166,#FF1B9A,#28B79D,#B354F1);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;-webkit-mask-composite:xor;padding:1px;animation:spin-border 4s linear infinite;pointer-events:none}
.price-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.price-big{font-family:var(--display);font-size:clamp(52px,10vw,80px);letter-spacing:.02em;line-height:1;color:var(--gold);margin-bottom:4px}
.price-sub{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:14px}
.price-breakdown{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.pb-chip{font-family:var(--mono);font-size:10px;padding:4px 12px;border-radius:20px;font-weight:700}
.pb-chip.green{background:rgba(40,183,157,.1);color:var(--green);border:1px solid rgba(40,183,157,.2)}
.pb-chip.violet{background:rgba(179,84,241,.1);color:var(--violet);border:1px solid rgba(179,84,241,.2)}
.pb-chip.gold{background:rgba(255,209,102,.1);color:var(--gold);border:1px solid rgba(255,209,102,.2)}

/* CANCELLATION */
.cancel-strip{display:flex;align-items:flex-start;gap:10px;background:rgba(255,209,102,.04);border:1px solid rgba(255,209,102,.14);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--dim);font-weight:500;line-height:1.6}
.cancel-strip strong{color:var(--gold)}

/* GET MY QUOTE BTN — Chrome Pink (party energy) */
.quote-btn{width:100%;margin-top:18px;background:linear-gradient(135deg,#f0b8d8 0%,#ffffff 12%,#d060a0 28%,#FF1B9A 44%,#c01880 56%,#e068b8 70%,#ffffff 84%,#e8b0d0 100%);background-size:250% 250%;animation:chrome-shift 3s ease infinite, liquid-blob 3.5s ease-in-out infinite;border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:18px 24px;font-family:var(--display);font-size:26px;letter-spacing:.06em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 28px rgba(255,27,154,.45),inset 0 1px 0 rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .2s}
.quote-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:55%;height:200%;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);animation:liquid-sweep 2.4s ease-in-out infinite;pointer-events:none}
.quote-btn:hover{box-shadow:0 12px 40px rgba(255,27,154,.7),inset 0 1px 0 rgba(255,255,255,.25);transform:translateY(-2px)}
.quote-btn:active{transform:scale(.98)}

/* MODAL */


/* SEND BTN — Chrome Green */
.send-btn{width:100%;background:linear-gradient(135deg,#b8f0e8 0%,#ffffff 12%,#40c0a8 28%,#28B79D 44%,#20a888 56%,#60c8b0 70%,#ffffff 84%,#a8e8e0 100%);background-size:250% 250%;animation:chrome-shift 3s ease infinite;border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:16px 24px;font-family:var(--display);font-size:22px;letter-spacing:.06em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(40,183,157,.4),inset 0 1px 0 rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .2s;margin-top:6px}
.send-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:55%;height:200%;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);animation:liquid-sweep 2.4s ease-in-out infinite;pointer-events:none}
.send-btn:hover{box-shadow:0 10px 36px rgba(40,183,157,.65),inset 0 1px 0 rgba(255,255,255,.3);transform:translateY(-2px)}
.send-btn:active{transform:scale(.98)}
.send-btn.loading{pointer-events:none;opacity:.8}
.send-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.send-btn.loading .send-spinner{display:block}
.send-btn.loading .send-txt{display:none}

/* SUCCESS */
.success{display:none;text-align:center;padding:10px 0 4px}
.success-icon{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#1a9a84,var(--green));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;animation:scaleIn .45s cubic-bezier(0.34,1.56,0.64,1) both;position:relative}
.success-icon::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--green);animation:ringExpand 1.6s ease infinite}
.success-title{font-family:var(--display);font-size:30px;letter-spacing:.04em;color:var(--green);margin-bottom:6px}
.success-sub{font-size:13px;color:var(--dim);line-height:1.65;font-weight:500}
.success-box{background:rgba(40,183,157,.05);border:1px solid rgba(40,183,157,.18);border-radius:12px;padding:14px 16px;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.75;text-align:left}
.success-box strong{color:var(--green)}

/* EXTRAS */
.extra-label{font-family:var(--display);font-size:16px;letter-spacing:.04em;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.extra-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 10px;border-radius:20px;background:rgba(179,84,241,.1);color:var(--violet);border:1px solid rgba(179,84,241,.2);letter-spacing:.04em}
.extra-hint{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.5}
.qty-row{display:flex;gap:8px}
.qty-opt{flex:1;background:var(--d3);border:1.5px solid var(--bdr);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s cubic-bezier(0.34,1.56,0.64,1);user-select:none;display:flex;flex-direction:column;align-items:center;gap:3px}
.qty-opt:hover{border-color:var(--subtle);transform:translateY(-2px)}
.qty-opt.active{border-color:var(--gold);background:rgba(255,209,102,.1);box-shadow:0 0 18px rgba(255,209,102,.2)}
.qty-num{font-family:var(--display);font-size:28px;letter-spacing:.02em;color:var(--text);line-height:1}
.qty-opt.active .qty-num{color:var(--gold)}
.qty-sub{font-family:var(--mono);font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.qty-opt.active .qty-sub{color:rgba(255,209,102,.6)}
/* ═══ THREE SCREENS ═══ */
.screen{
  position:fixed;inset:0;background:var(--d0);
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease, transform .35s cubic-bezier(0.34,1.56,0.64,1);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transform:translateX(40px);
}
.screen.active{opacity:1;pointer-events:all;transform:translateX(0)}
.screen.exit-left{opacity:0;transform:translateX(-40px)}

/* Progress dots */
.progress{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 0 0}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);transition:all .3s cubic-bezier(0.34,1.56,0.64,1)}
.prog-dot.active{background:var(--gold);box-shadow:0 0 8px var(--gold);width:24px;border-radius:4px}
.prog-dot.done{background:var(--green)}

/* Next button — Chrome Pink */
.next-btn{width:100%;background:linear-gradient(135deg,#f0b8d8 0%,#ffffff 12%,#d060a0 28%,#FF1B9A 44%,#c01880 56%,#e068b8 70%,#ffffff 84%,#e8b0d0 100%);background-size:250% 250%;animation:chrome-shift 3s ease infinite;border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:16px 28px;font-family:var(--display);font-size:22px;letter-spacing:.06em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(255,27,154,.4),inset 0 1px 0 rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .2s;margin-top:10px}
.next-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:55%;height:200%;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);animation:liquid-sweep 2.4s ease-in-out infinite;pointer-events:none}
.next-btn:hover{box-shadow:0 10px 36px rgba(255,27,154,.65);transform:translateY(-2px)}
.next-btn:active{transform:scale(.98)}

/* Back button */
.back-btn{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--muted);background:none;border:none;cursor:pointer;padding:10px 20px 0;transition:color .18s;align-self:flex-start}
.back-btn:hover{color:var(--text)}

/* P3 form card */
.form-card{background:var(--d2);border:1px solid var(--bdr);border-radius:20px;padding:22px 20px 30px;width:calc(100% - 32px);max-width:460px;margin:12px auto 40px;position:relative;flex-shrink:0}
.form-card::before{content:'';position:absolute;inset:-1.5px;border-radius:21.5px;background:conic-gradient(from var(--angle),#FF1B9A,#FFD166,#B354F1,#28B79D,#FF1B9A);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;-webkit-mask-composite:xor;padding:1.5px;animation:spin-border 4s linear infinite;pointer-events:none}

/* Order summary */
.order-summary{background:rgba(255,255,255,.03);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:14px}
.os-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.os-row:last-child{border-bottom:none;background:rgba(255,209,102,.04)}
.os-label{color:var(--dim);font-weight:500;display:flex;align-items:center;gap:6px}
.os-val{font-family:var(--mono);font-weight:700;color:var(--text);font-size:11px}
.os-val.gold{color:var(--gold)}.os-val.green{color:var(--green)}

/* Inputs */
.lbl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:50px;padding:11px 16px;font-family:var(--font);font-size:14px;font-weight:500;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:10px;-webkit-appearance:none}
.inp:focus{border-color:var(--pink);background:rgba(255,27,154,.04)}
.inp.err{border-color:var(--pink)}
.inp[type=date],.inp[type=time]{color-scheme:dark;padding:10px 16px}
.inp[type=date]::-webkit-calendar-picker-indicator,.inp[type=time]::-webkit-calendar-picker-indicator{filter:invert(.5) sepia(1) saturate(3) hue-rotate(290deg);cursor:pointer;opacity:.7}
.err-msg{font-family:var(--mono);font-size:11px;color:var(--pink);margin-top:-7px;margin-bottom:8px;padding-left:16px;display:none}
.err-msg.show{display:block}
.cancel-pill{display:flex;gap:8px;align-items:center;background:rgba(255,209,102,.04);border:1px solid rgba(255,209,102,.14);border-radius:50px;padding:9px 14px;font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:500}
.cancel-pill strong{color:var(--gold)}

/* Send btn */
.send-btn{width:100%;background:linear-gradient(135deg,#b8f0e8 0%,#ffffff 12%,#40c0a8 28%,#28B79D 44%,#20a888 56%,#60c8b0 70%,#ffffff 84%,#a8e8e0 100%);background-size:250% 250%;animation:chrome-shift 3s ease infinite;border:1.5px solid rgba(255,255,255,.3);border-radius:50px;padding:16px 24px;font-family:var(--display);font-size:22px;letter-spacing:.06em;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(40,183,157,.4),inset 0 1px 0 rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .2s;margin-top:6px}
.send-btn::after{content:'';position:absolute;top:-50%;left:-75%;width:55%;height:200%;background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);animation:liquid-sweep 2.4s ease-in-out infinite;pointer-events:none}
.send-btn:hover{box-shadow:0 10px 36px rgba(40,183,157,.65);transform:translateY(-2px)}
.send-btn:active{transform:scale(.98)}
.send-btn.loading{pointer-events:none;opacity:.8}
.send-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
.send-btn.loading .send-spinner{display:block}
.send-btn.loading .send-txt{display:none}

/* Success */
.success{display:none;text-align:center;padding:10px 0}
.success-icon{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#1a9a84,var(--green));display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;animation:scaleIn .45s cubic-bezier(0.34,1.56,0.64,1) both;position:relative}
.success-icon::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:2px solid var(--green);animation:ringExpand 1.6s ease infinite}
.success-title{font-family:var(--display);font-size:30px;letter-spacing:.04em;color:var(--green);margin-bottom:6px}
.success-sub{font-size:13px;color:var(--dim);line-height:1.65;font-weight:500}
.success-box{background:rgba(40,183,157,.05);border:1px solid rgba(40,183,157,.18);border-radius:12px;padding:14px 16px;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.75;text-align:left}
.success-box strong{color:var(--green)}

</style>
</head>

<script>

/* ── State ── */
let num = 1;
let ipadCount = 0;
let channels = 1;
let glowSticks = 0;
let partyType = {type:'hens', label:'Hens Party', emoji:'💍'};

const IPAD_FEE = 50;
const GLOW_FEE = 2;
const SHIPPING_FEE = 60;   // $60 return shipping, $120 if 100+ headsets

const fmt = n => '$' + Math.round(n).toLocaleString('en-AU');


/* ── Name → hero title ── */
function onNameInput(val) {
  const line = document.getElementById('heroLine1');
  const name = val.trim();
  if (name) {
    line.innerHTML = '<span class="hero-name-neon">' + name + '\'s</span>';
  } else {
    line.textContent = 'Your';
  }
}

/* ── Party date vibes ── */
const VIBES = {
  5: '🎉 Friday night — peak disco energy!',
  6: '🌟 Saturday — the best night of the week!',
  0: '🌈 Sunday session — love it!',
  1: '😅 Monday party? You absolute legend.',
  2: '🔥 Tuesday? Mid-week madness — we\'re here for it.',
  3: '💃 Wednesday hump day disco — yes!',
  4: '🍺 Thursday — nearly the weekend, let\'s go!',
};
function onDateInput() {
  const val  = document.getElementById('partyDate').value;
  const time = document.getElementById('partyTime') ? document.getElementById('partyTime').value : '';
  const el   = document.getElementById('dateVibes');
  if (!val) { el.style.display = 'none'; document.getElementById('mPartyDate').textContent = 'Fill in below ↓'; return; }
  const day = new Date(val + 'T00:00:00').getDay();
  el.textContent = VIBES[day] || '';
  el.style.display = 'block';
  const d = new Date(val + 'T00:00:00');
  const dateStr = d.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
  document.getElementById('mPartyDate').textContent = dateStr + (time ? ' · ' + time : '');
}

function onLocationInput(val) {
  const locRow = document.getElementById('mLocationRow');
  const locEl  = document.getElementById('mLocation');
  if (val.trim()) {
    locRow.style.display = 'flex';
    locEl.textContent = val.trim();
  } else {
    locRow.style.display = 'none';
  }
}


const PARTY_MAP = {
  hens:       {label:'Hens Party',    emoji:'💍'},
  birthday:   {label:'Birthday Party',emoji:'🎂'},
  wedding:    {label:'Wedding',       emoji:'💒'},
  sports:     {label:'Sports Team',  emoji:'🏆'},

/* ── Pricing ── */
function rateFor(n) {
  // Anchors: 1=$25, 5=$15, 10=$12, 200=$10
  // Convex exponential decay — drops steeply early, flattens out
  if (n <= 1)   return 25;
  if (n >= 200) return 10;
  // Fit a smooth curve: rate = a * n^(-b) + c
  // Tuned so: n=1→25, n=5→15, n=10→12, n=200→10
  const a = 15.2, b = 0.72, c = 9.8;
  const r = a * Math.pow(n, -b) + c;
  return Math.round(Math.min(25, Math.max(10, r)) * 10) / 10;
}

function shippingFor(n) { return n >= 100 ? 120 : 60; }
function totalFor(n) {
  return n * rateFor(n) + (ipadCount * IPAD_FEE) + (glowSticks * GLOW_FEE) + shippingFor(n);
}

  ['s1','s2','s3'].forEach((id, i) => {

    el.classList.remove('active', 'exit-left');
    if (i + 1 < n) el.classList.add('exit-left');
  });
  const target = document.getElementById('s' + n);
  if (target) { target.classList.add('active'); target.scrollTop = 0; }
  document.body.style.overflow = 'hidden';

  // Update progress dots — each screen has its own 3 dots
  const screenId = 's' + n;
  const screenEl = document.getElementById(screenId);
  if (!screenEl) return;
  screenEl.querySelectorAll('.prog-dot').forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i + 1 === n) d.classList.add('active');
    else if (i + 1 < n) d.classList.add('done');
  });
}

function send() {
  const nameInp  = document.getElementById('nameInp');
  const emailInp = document.getElementById('emailInp');
  const nameErr  = document.getElementById('nameErr');
  const emailErr = document.getElementById('emailErr');
  const name  = nameInp ? nameInp.value.trim() : '';
  const email = emailInp ? emailInp.value.trim() : '';
  let valid = true;

  if (!name) {
    if (nameInp) nameInp.classList.add('err');
    if (nameErr) nameErr.classList.add('show');
    if (nameInp) nameInp.focus();
    valid = false;
  } else {
    if (nameInp) nameInp.classList.remove('err');
    if (nameErr) nameErr.classList.remove('show');
  }

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    if (emailInp) emailInp.classList.add('err');
    if (emailErr) emailErr.classList.add('show');
    if (valid && emailInp) emailInp.focus();
    valid = false;
  } else {
    if (emailInp) emailInp.classList.remove('err');
    if (emailErr) emailErr.classList.remove('show');
  }

  if (!valid) return;

  const btn = document.getElementById('sendBtn');
  if (btn) btn.classList.add('loading');

  setTimeout(() => {
    if (btn) btn.classList.remove('loading');
    const cs = document.getElementById('contactState');
    if (cs) cs.style.display = 'none';
    const s3 = document.getElementById('s3');
    if (s3) s3.scrollTop = 0;
    const suc = document.getElementById('successState');
    if (suc) { suc.style.display = 'block'; suc.style.animation = 'slideUp .4s ease both'; }

    const successBox = document.getElementById('successBox');
    if (successBox) successBox.innerHTML = `
      <strong>What happens next${name ? ', ' + name.split(' ')[0] : ''}?</strong><br>
      We'll confirm your party pack and delivery window at <span style="color:var(--green)">${email}</span>. Usually within a few hours.<br><br>
      <strong>Your pack:</strong> ${num} headsets · ${channels} channel${channels>1?'s':''} · ${partyType.label} ${partyType.emoji}${ipadCount ? ' · ' + ipadCount + ' iPad' + (ipadCount>1?'s':'') : ''}${glowSticks ? ' · ' + glowSticks + ' glow sticks' : ''}<br>
      <strong>Estimated total:</strong> ${fmt(totalFor(num))} (incl. ${fmt(shippingFor(num))} return shipping)<br>
      <strong>Phone:</strong> ${(document.getElementById('phoneInp')||{}).value||'—'}<br>
      <strong>Party date:</strong> ${(document.getElementById('mPartyDate')||{}).textContent||'TBC'}<br>
      <strong>Location:</strong> ${(document.getElementById('partyLocation')||{}).value||'TBC'}<br><br>
      <strong>Cancellation:</strong> Free within 7 days. 50% fee applies after that.
    `;

    for (let i = 0; i < 6; i++) {
      setTimeout(() => launchConfetti(null, true), i * 150);
    }
  }, 1300);
}

/* ── SAD FACES on minus click ── */
const SAD_EMOJIS = ['😭','😢','🥺','😟','😿','💔','😓','😞'];
let sadParticles = [];
let sadRaf;

function launchSadFaces() {
  const btn = document.getElementById('minusBtn');
  const rect = btn.getBoundingClientRect();
  const ox = rect.left + rect.width / 2;
  const oy = rect.top + rect.height / 2;

  for (let i = 0; i < 8; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.2;
    const spd = 3 + Math.random() * 5;
    sadParticles.push({
      x: ox, y: oy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      g: 0.18 + Math.random() * 0.1,
      emoji: SAD_EMOJIS[Math.floor(Math.random() * SAD_EMOJIS.length)],
      size: 18 + Math.floor(Math.random() * 16),
      life: 1, decay: 0.018 + Math.random() * 0.01,
      rot: (Math.random() - 0.5) * 0.15,
    });
  }
  if (!sadRaf) animSad();
}

function animSad() {
  cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
  // Also redraw confetti if active
  // (they share the same canvas — redraw both)
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.g;
    p.vx *= .99; p.life -= p.decay; p.rot += p.rotSpd;
    cCtx.save(); cCtx.globalAlpha = Math.max(0, p.life);
    cCtx.translate(p.x, p.y); cCtx.rotate(p.rot); cCtx.fillStyle = p.col;
    if (p.shape === 'circle') { cCtx.beginPath(); cCtx.arc(0,0,p.sz/2,0,Math.PI*2); cCtx.fill(); }
    else { cCtx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2); }
    cCtx.restore();
  });
  particles = particles.filter(p => p.life > 0);

  sadParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.g; p.vx *= .98;
    p.life -= p.decay;
    cCtx.save();
    cCtx.globalAlpha = Math.max(0, p.life);
    cCtx.font = `${p.size}px serif`;
    cCtx.textAlign = 'center';
    cCtx.textBaseline = 'middle';
    cCtx.translate(p.x, p.y);
    cCtx.rotate(p.rot * p.life * 10);
    cCtx.fillText(p.emoji, 0, 0);
    cCtx.restore();
  });
  sadParticles = sadParticles.filter(p => p.life > 0);

  if (sadParticles.length > 0 || particles.length > 0) {
    sadRaf = requestAnimationFrame(animSad);
  } else {
    sadRaf = null;
    cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
  }
}
const cCanvas = document.getElementById('confetti');
const cCtx = cCanvas.getContext('2d');
let particles = [];
let raf;
const COLS = ['#FFD166','#B354F1','#FF1B9A','#28B79D','#FF9F46','#ffffff','#6A14DB','#ff6b6b'];

function resizeC() { cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight; }
resizeC();
window.addEventListener('resize', resizeC);

function launchConfetti(e, bigBurst) {
  const btn = document.querySelector('.c-btn.plus');
  const rect = btn ? btn.getBoundingClientRect() : {left:window.innerWidth/2, top:window.innerHeight/2, width:0, height:0};
  const ox = bigBurst ? (window.innerWidth * (.2 + Math.random() * .6)) : (rect.left + rect.width/2);
  const oy = bigBurst ? 80 : (rect.top + rect.height/2);
  const count = bigBurst ? 60 : 35;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (bigBurst ? 6 : 4) + Math.random() * 9;
    particles.push({
      x:ox, y:oy,
      vx:Math.cos(angle)*spd,
      vy:Math.sin(angle)*spd - (bigBurst ? 6 : 3),
      g:.22 + Math.random()*.1,
      col:COLS[Math.floor(Math.random()*COLS.length)],
      sz:5 + Math.random()*9,
      shape:Math.random()<.55?'rect':'circle',
      life:1, decay:.014+Math.random()*.012,
      rot:Math.random()*Math.PI*2,
      rotSpd:(Math.random()-.5)*.2
    });
  }
  if (!raf) animC();
}

function animC() {
  cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.g;
    p.vx *= .99; p.life -= p.decay; p.rot += p.rotSpd;
    cCtx.save();
    cCtx.globalAlpha = Math.max(0, p.life);
    cCtx.translate(p.x, p.y); cCtx.rotate(p.rot);
    cCtx.fillStyle = p.col;
    if (p.shape === 'circle') {
      cCtx.beginPath(); cCtx.arc(0, 0, p.sz/2, 0, Math.PI*2); cCtx.fill();
    } else {
      cCtx.fillRect(-p.sz/2, -p.sz/4, p.sz, p.sz/2);
    }
    cCtx.restore();
  });
  if (particles.length > 0) { raf = requestAnimationFrame(animC); }
  else { raf = null; if(!sadRaf && sadParticles.length===0) cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); }
}

/* ── Stars ── */
(function(){
  const c = document.getElementById('stars'), ctx = c.getContext('2d');
  let S = [];
  function init(){ c.width=window.innerWidth; c.height=Math.max(window.innerHeight,document.body.scrollHeight);
    S=Array.from({length:200},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.8+.2,o:Math.random()*.8+.15,tw:Math.random()*Math.PI*2,sp:Math.random()*.04+.015,col:Math.random()<.08?(Math.random()<.5?'179,84,241':'255,209,102'):'255,255,255'}));
  }
  function draw(){ ctx.clearRect(0,0,c.width,c.height); const t=Date.now()*.001;
    S.forEach(s=>{const a=s.o*(0.2+0.8*Math.abs(Math.sin(t*s.sp*60+s.tw)));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.col},${Math.min(1,a).toFixed(3)})`;ctx.fill();});
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init); init(); draw();
})();

let priceChart;

function buildChart() {
  // Dense points around the steep early drop, sparser later
  const pts = [];
  for (let h = 1; h <= 10; h++) pts.push({x: h, y: rateFor(h)});
  for (let h = 12; h <= 30; h += 2) pts.push({x: h, y: rateFor(h)});
  for (let h = 35; h <= 200; h += 5) pts.push({x: h, y: rateFor(h)});

  const ctx = document.getElementById('priceChart').getContext('2d');
  priceChart = new Chart(ctx, {
    type: 'line',
    data: { datasets: [
      { data: pts,
        borderColor: 'rgba(255,209,102,.7)',
        backgroundColor(c){ const g=c.chart.ctx.createLinearGradient(0,0,0,120); g.addColorStop(0,'rgba(255,209,102,.2)'); g.addColorStop(1,'rgba(255,209,102,0)'); return g; },
        fill: true, tension: .35, pointRadius: 0, borderWidth: 2.5 },
      { data: [{x: num, y: rateFor(num)}],
        borderColor: '#FF1B9A', backgroundColor: '#FF1B9A',
        pointRadius: 7, pointHoverRadius: 9, pointBorderWidth: 2,
        pointBorderColor: 'rgba(255,255,255,.5)', showLine: false }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false, animation: {duration: 0},
      scales: {
        x: {
          type: 'logarithmic',
          min: 1, max: 200,
          ticks: {
            color: 'rgba(255,255,255,.3)',
            font: {size: 9, family: 'JetBrains Mono'},
            callback: v => [1,5,10,20,50,100,200].includes(v) ? v : '',
            maxTicksLimit: 10,
          },
          grid: {color: 'rgba(255,255,255,.04)'},
          border: {display: false}
        },
        y: {
          ticks: {color: 'rgba(255,255,255,.3)', font: {size: 9, family: 'JetBrains Mono'}, callback: v => '$'+v},
          grid: {color: 'rgba(255,255,255,.04)'},
          border: {display: false},
          min: 9, max: 27
        }
      },
      plugins: {
        legend: {display: false},
        tooltip: {
          filter: i => i.datasetIndex === 1,
          callbacks: {title: () => '', label: i => `${Math.round(i.parsed.x)} headsets · $${i.parsed.y.toFixed(2)}/head`},
          backgroundColor: 'rgba(13,13,16,.95)', bodyColor: '#FF1B9A',
          borderColor: 'rgba(255,27,154,.3)', borderWidth: 1,
          padding: 10, cornerRadius: 8, displayColors: false
        }
      }
    }
  });
}

function updateChart() {
  if (!priceChart) return;
  priceChart.data.datasets[1].data = [{x: num, y: rateFor(num)}];
  priceChart.update('none');
  document.getElementById('chartRateLabel').textContent = '$' + rateFor(num).toFixed(2) + '/head · ' + num + ' headsets';
}

<script>
/* ── Google Places Autocomplete ── */
let _pL=false,_pLing=false,_pQ=[];
async function loadPlaces(){
  if(_pL)return true;
  if(_pLing)return new Promise(r=>_pQ.push(r));
  _pLing=true;
  try{
    const j=await fetch("/api/maps-key").then(r=>r.json());
    if(!j.key)return false;
    await new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src=`https://maps.googleapis.com/maps/api/js?key=${j.key}&libraries=places&callback=initPlacesReady`;
      s.async=true; s.onerror=rej; document.head.appendChild(s);
      window.initPlacesReady=()=>{_pL=true;_pLing=false;_pQ.forEach(r=>r(true));_pQ=[];res();};
    });
    const st=document.createElement("style");
    st.textContent=`.pac-container{background:#1c1c22!important;border:1px solid #3a3a4a!important;border-radius:10px!important;margin-top:4px!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;z-index:99999!important}.pac-item{padding:8px 14px!important;color:#9999b0!important;font-size:13px!important;cursor:pointer!important;border-top:1px solid #2e2e38!important}.pac-item:hover,.pac-item-selected{background:rgba(179,84,241,.12)!important}.pac-item-query{color:#fff!important;font-weight:600!important}.pac-icon{display:none!important}.pac-matched{color:#B354F1!important}`;
    document.head.appendChild(st);
    return true;
  }catch(e){return false;}
}
async function placesOn(id,cb){
  if(!await loadPlaces())return;
  const el=document.getElementById(id);
  if(!el||el._pi)return; el._pi=true;
  const ac=new google.maps.places.Autocomplete(el,{fields:["formatted_address","name"]});
  ac.addListener("place_changed",()=>{
    const p=ac.getPlace();
    el.value=p.name?p.name+", "+p.formatted_address:p.formatted_address;
    if(cb)cb(el.value,p);
  });
}
